services:
  aidefense-proxy:
    build:
      context: ./aidefense-proxy
    container_name: aidefense-proxy
    restart: unless-stopped
    environment:
      AIDEFENSE_PROXY_PORT: ${AIDEFENSE_PROXY_PORT}
      AIDEFENSE_BASE_URL: ${AIDEFENSE_BASE_URL}
      AIDEFENSE_API_KEY: ${AIDEFENSE_API_KEY}
      AIDEFENSE_ENFORCEMENT_MODE: ${AIDEFENSE_ENFORCEMENT_MODE}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-xdr:
    build:
      context: ../mcp-xdr
    container_name: mcp-xdr
    restart: unless-stopped
    environment:
      XDR_CLIENT_ID: ${XDR_CLIENT_ID}
      XDR_CLIENT_SECRET: ${XDR_CLIENT_SECRET}
      XDR_TOKEN_URL: ${XDR_TOKEN_URL}
      XDR_CONURE_BASE_URL: ${XDR_CONURE_BASE_URL}
      XDR_HTTP_TIMEOUT: ${XDR_HTTP_TIMEOUT}
      XDR_VERIFY_TLS: ${XDR_VERIFY_TLS}
      XDR_TOKEN_REFRESH_SKEW_SECONDS: ${XDR_TOKEN_REFRESH_SKEW_SECONDS}
      MCP_XDR_PORT: ${MCP_XDR_PORT}
      MCP_XDR_PATH: ${MCP_XDR_PATH}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-endace-vault:
    build:
      context: ../mcp-endace-vault
    container_name: mcp-endace-vault
    restart: unless-stopped
    environment:
      ENDACE_VAULT_BASE_URL: ${ENDACE_VAULT_BASE_URL}
      ENDACE_VAULT_USERNAME: ${ENDACE_VAULT_USERNAME}
      ENDACE_VAULT_PASSWORD: ${ENDACE_VAULT_PASSWORD}
      ENDACE_VAULT_TIMEOUT: ${ENDACE_VAULT_TIMEOUT}
      ENDACE_VAULT_VERIFY_TLS: ${ENDACE_VAULT_VERIFY_TLS}
      MCP_ENDACE_VAULT_PORT: ${MCP_ENDACE_VAULT_PORT}
      MCP_ENDACE_VAULT_PATH: ${MCP_ENDACE_VAULT_PATH}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  open-webui:
    build:
      context: ./open-webui-custom
      args:
        OPEN_WEBUI_BASE_IMAGE: ${OPEN_WEBUI_IMAGE}
    image: open-webui-custom:local
    container_name: ${OPEN_WEBUI_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      aidefense-proxy:
        condition: service_healthy
    environment:
      # Open WebUI points to the local AI Defense proxy, not directly to Ollama.
      # The proxy performs Cisco inspection on prompts and model responses
      # before forwarding approved traffic to the host Ollama service.
      OLLAMA_BASE_URL: http://aidefense-proxy:${AIDEFENSE_PROXY_PORT}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: ${WEBUI_URL}
      SCIM_ENABLED: ${SCIM_ENABLED}
      SCIM_TOKEN: ${SCIM_TOKEN}
      SCIM_AUTH_PROVIDER: ${SCIM_AUTH_PROVIDER}
      ENABLE_OAUTH_SIGNUP: ${ENABLE_OAUTH_SIGNUP}
      ENABLE_OAUTH_PERSISTENT_CONFIG: ${ENABLE_OAUTH_PERSISTENT_CONFIG}
      OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME}
      OPENID_PROVIDER_URL: ${OPENID_PROVIDER_URL}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_SCOPES: ${OAUTH_SCOPES}
      OPENID_REDIRECT_URI: ${OPENID_REDIRECT_URI}
    volumes:
      - open-webui-data:/app/backend/data

  nginx:
    image: nginx:1.27-alpine
    container_name: ${NGINX_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      open-webui:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      OPEN_WEBUI_UPSTREAM: open-webui:${OPEN_WEBUI_CONTAINER_PORT}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  open-webui-data:
